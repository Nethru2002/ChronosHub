<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Professional Title -->
    <title>ChronosHub | Universal Time & Age Engine</title>

    <!-- Tailwind CSS for high-end styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter for UI, JetBrains Mono for the math/numbers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
      /* Apply smooth typography across the project */
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #030712; /* Tailwind gray-950 */
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom scrollbar for a "Big Project" feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #111827;
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4b5563;
      }
    </style>
  </head>

  <body class="bg-gray-950 text-white selection:bg-blue-500/30">
    <!-- React targets this div to inject your dashboard -->
    <div id="root"></div>

    <!-- 
      IMPORTANT: In Vite, we link the source script directly in index.html. 
      This tells Vite where the "entry point" of your React app is.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
